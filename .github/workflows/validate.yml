name: Rift Validation Gates

on:
  pull_request:
  push:
    branches:
      - main
      - cursor/**

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run lint
        run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Rift and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pyarrow rich python-dotenv structlog shap
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run tests
        run: pytest tests/ -v --tb=short

  validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Rift and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pyarrow rich python-dotenv structlog shap
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Run validation gates
        run: |
          chmod +x scripts/ci_validate.sh
          ./scripts/ci_validate.sh
